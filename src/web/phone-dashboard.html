<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConvoAI Phone Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a; color: #e0e0e0;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      background: #1a1a1a; border: 1px solid #333; border-radius: 16px;
      padding: 32px; width: 100%; max-width: 600px;
    }
    h1 { font-size: 20px; color: #00c8ff; text-align: center; margin-bottom: 4px; }
    .label { color: #aaa; font-size: 14px; text-align: center; margin-bottom: 20px; }
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; background: #111; border-radius: 8px; margin-bottom: 20px;
    }
    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 600;
    }
    .status-badge.active { background: #00ff8822; color: #00ff88; }
    .status-badge.starting { background: #ffaa0022; color: #ffaa00; }
    .status-badge.ended { background: #66666622; color: #888; }
    .status-badge.failed { background: #ff444422; color: #ff4444; }
    .status-badge::before {
      content: ''; width: 8px; height: 8px; border-radius: 50%;
      background: currentColor;
    }
    .duration { font-family: 'SF Mono', Monaco, monospace; font-size: 18px; color: #fff; }
    .transcript-container { display: flex; gap: 12px; margin-bottom: 20px; }
    .transcript-container.single { display: block; }
    .transcript-panel {
      flex: 1; background: #111; border: 1px solid #222; border-radius: 8px;
      padding: 12px; max-height: 320px; overflow-y: auto;
    }
    .transcript-panel h3 {
      font-size: 12px; color: #666; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 8px;
    }
    .transcript-line {
      font-size: 13px; line-height: 1.6; padding: 2px 0; color: #ccc;
    }
    .task-display {
      background: #111; border: 1px solid #333; border-radius: 8px;
      padding: 12px 16px; margin-bottom: 16px; font-size: 13px; color: #aaa;
    }
    .task-display strong { color: #00c8ff; }
    .controls { text-align: center; }
    .btn-hangup {
      background: #ff4444; color: #fff; border: none; border-radius: 8px;
      padding: 10px 32px; font-size: 14px; font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-hangup:hover { background: #cc3333; }
    .btn-hangup:disabled { background: #444; cursor: default; }
    .hint { color: #444; font-size: 11px; text-align: center; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ConvoAI Phone</h1>
    <div class="label" id="label">Connecting...</div>

    <div class="status-bar">
      <div class="status-badge starting" id="statusBadge">Starting</div>
      <div class="duration" id="duration">00:00</div>
    </div>

    <div id="taskDisplay" class="task-display" style="display:none">
      <strong>Task:</strong> <span id="taskText"></span>
    </div>

    <div class="transcript-container single" id="transcriptContainer">
      <div class="transcript-panel" id="panelLeft">
        <h3 id="panelLeftTitle">Transcript</h3>
        <div id="transcriptLeft"></div>
      </div>
      <div class="transcript-panel" id="panelRight" style="display:none">
        <h3 id="panelRightTitle">Transcript</h3>
        <div id="transcriptRight"></div>
      </div>
    </div>

    <div class="controls">
      <button class="btn-hangup" id="hangupBtn" onclick="hangup()">Hang Up</button>
    </div>
    <p class="hint">Press Ctrl+C in the terminal to stop</p>
  </div>

  <script>
    let eventSource;

    function connect() {
      eventSource = new EventSource('/events');

      eventSource.addEventListener('init', (e) => {
        const data = JSON.parse(e.data);
        document.getElementById('label').textContent = data.label;
        setupMode(data.mode, data.config);
      });

      eventSource.addEventListener('status', (e) => {
        const data = JSON.parse(e.data);
        updateStatus(data.status);
        updateDuration(data.duration);
      });

      eventSource.addEventListener('ended', (e) => {
        const data = JSON.parse(e.data);
        updateStatus(data.status);
        document.getElementById('hangupBtn').disabled = true;
        document.getElementById('hangupBtn').textContent = 'Call Ended';
      });

      eventSource.onerror = () => {
        eventSource.close();
        setTimeout(connect, 3000);
      };
    }

    function setupMode(mode, config) {
      const container = document.getElementById('transcriptContainer');
      if (mode === 'translate') {
        container.classList.remove('single');
        document.getElementById('panelRight').style.display = '';
        document.getElementById('panelLeftTitle').textContent =
          (config.sourceLang || 'You').toUpperCase();
        document.getElementById('panelRightTitle').textContent =
          (config.targetLang || 'Them').toUpperCase();
      } else if (mode === 'agent') {
        if (config.task) {
          document.getElementById('taskDisplay').style.display = '';
          document.getElementById('taskText').textContent = config.task;
        }
        document.getElementById('panelLeftTitle').textContent = 'Agent Conversation';
      } else {
        document.getElementById('panelLeftTitle').textContent = 'Transcript';
      }
    }

    function updateStatus(status) {
      const badge = document.getElementById('statusBadge');
      badge.textContent = status;
      badge.className = 'status-badge';
      if (status === 'RUNNING') badge.classList.add('active');
      else if (status === 'STARTING') badge.classList.add('starting');
      else if (status === 'STOPPED') badge.classList.add('ended');
      else if (status === 'FAILED') badge.classList.add('failed');
    }

    function updateDuration(seconds) {
      const mm = String(Math.floor(seconds / 60)).padStart(2, '0');
      const ss = String(seconds % 60).padStart(2, '0');
      document.getElementById('duration').textContent = `${mm}:${ss}`;
    }

    async function hangup() {
      const btn = document.getElementById('hangupBtn');
      btn.disabled = true;
      btn.textContent = 'Hanging up...';
      try {
        await fetch('/hangup', { method: 'POST' });
      } catch {
        btn.disabled = false;
        btn.textContent = 'Hang Up';
      }
    }

    connect();
  </script>
</body>
</html>
