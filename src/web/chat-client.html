<!DOCTYPE html>
<html><head><title>ConvoAI Headless</title></head>
<body>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.22.0.js"></script>
<script>
  const P = new URLSearchParams(location.search);
  const appId = P.get('appId');
  const channel = P.get('channel');
  const token = P.get('token') || null;
  const uid = Number(P.get('uid')) || 0;
  const wsPort = P.get('wsPort') || '3211';
  const pttMode = P.get('ptt') === '1';

  let ws, client, localTrack;

  function send(msg) {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg));
  }

  async function cleanup() {
    try { if (localTrack) { localTrack.stop(); localTrack.close(); } } catch {}
    try { if (client) await client.leave(); } catch {}
    send({ type: 'stopped' });
  }

  async function start() {
    ws = new WebSocket('ws://localhost:' + wsPort);
    ws.onopen = () => send({ type: 'ws_connected' });
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'stop') cleanup();
        if (msg.type === 'ptt_on' && localTrack) {
          localTrack.setMuted(false);
          send({ type: 'ptt_status', muted: false });
        }
        if (msg.type === 'ptt_off' && localTrack) {
          localTrack.setMuted(true);
          send({ type: 'ptt_status', muted: true });
        }
      } catch {}
    };

    try {
      client = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });

      client.on('user-published', async (user, mediaType) => {
        await client.subscribe(user, mediaType);
        if (mediaType === 'audio') {
          user.audioTrack.play();
          send({ type: 'agent_speaking', speaking: true });
        }
      });

      client.on('user-unpublished', (user, mediaType) => {
        if (mediaType === 'audio') send({ type: 'agent_speaking', speaking: false });
      });

      client.on('user-left', () => send({ type: 'agent_left' }));

      // ── Real-time transcript via DataStream ──────────────────
      client.on('stream-message', (uid, data) => {
        try {
          // DataStream may send chunked messages: message_id|part_idx|part_sum|base64
          // Or direct JSON for v2 protocol
          let text;
          if (data instanceof Uint8Array) {
            text = new TextDecoder().decode(data);
          } else {
            text = String(data);
          }

          // Try to parse as direct JSON first
          try {
            const msg = JSON.parse(text);
            if (msg.object) {
              send({ type: 'transcript', data: msg });
              return;
            }
          } catch {}

          // Chunked protocol: message_id|part_idx|part_sum|base64_content
          if (text.includes('|')) {
            const parts = text.split('|');
            if (parts.length >= 4) {
              const msgId = parts[0];
              const partIdx = parseInt(parts[1], 10);
              const partSum = parseInt(parts[2], 10);
              const b64 = parts.slice(3).join('|');

              // Simple reassembly for single-part messages
              if (partSum === 1) {
                try {
                  const decoded = atob(b64);
                  const msg = JSON.parse(decoded);
                  if (msg.object) {
                    send({ type: 'transcript', data: msg });
                  }
                } catch {}
              }
              // Multi-part: accumulate (simplified — just handle single-part for now)
            }
          }
        } catch {}
      });

      send({ type: 'status', text: 'Joining channel...' });
      await client.join(appId, channel, token, uid || null);
      send({ type: 'status', text: 'Joined' });

      localTrack = await AgoraRTC.createMicrophoneAudioTrack({
        AEC: true,   // echo cancellation
        ANS: true,   // noise suppression
        AGC: true,   // auto gain control
      });
      await client.publish([localTrack]);
      // PTT mode: start muted, terminal controls via WebSocket
      if (pttMode) {
        localTrack.setMuted(true);
        send({ type: 'ready', ptt: true });
      } else {
        send({ type: 'ready' });
      }
    } catch (err) {
      send({ type: 'error', text: err.message });
    }
  }

  start();
</script>
</body>
</html>
