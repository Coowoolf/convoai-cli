<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConvoAI Starter</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- Agent — always vertically centered -->
  <div class="center-stage">
    <div id="agent-ring" class="agent-ring">
      <div class="agent-avatar">AI</div>
    </div>
    <div id="freq-bars" class="freq-bars">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div id="agent-status" class="agent-status">Ready to talk</div>
  </div>

  <!-- Subtitles — bottom overlay, like real subtitles -->
  <div id="subtitles" class="subtitles"></div>

  <!-- Controls — fixed bottom -->
  <div class="control-bar">
    <button id="btn-mic" class="btn-circle" title="Mute" onclick="toggleMic()" disabled>
      <svg id="mic-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
      </svg>
      <svg id="mic-off-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <line x1="2" y1="2" x2="22" y2="22"/>
        <path d="M18.89 13.23A7.12 7.12 0 0 0 19 12v-2"/>
        <path d="M5 10v2a7 7 0 0 0 12 5"/>
        <path d="M15 9.34V5a3 3 0 0 0-5.68-1.33"/>
        <path d="M9 9v3a3 3 0 0 0 5.12 2.12"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
      </svg>
    </button>
    <button id="btn-start" class="btn-main" onclick="toggleConversation()">Start</button>
    <button id="btn-interrupt" class="btn-circle" title="Interrupt" onclick="interruptAgent()" style="visibility:hidden">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="4" width="4" height="16" rx="1"/>
        <rect x="14" y="4" width="4" height="16" rx="1"/>
      </svg>
    </button>
  </div>

  <script src="/agora-sdk.js"></script>
  <script src="/app.js"></script>
</body>
</html>
